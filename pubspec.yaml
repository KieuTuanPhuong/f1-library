dev_dependencies:

dependency_overrides:
  firebase_core_platform_interface: 6.0.0
  archive: ^3.6.1
  flutter_cube: ^0.1.1

  motion_sensor:
    git:
      url: https://github.com/sajilopatro/motion_sensor
      ref: master

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logosummer.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/
    - assets/


  fonts:
    - family: Barlow
      fonts:
        - asset: assets/fonts/Barlow/Barlow-Regular.ttf
        - asset: assets/fonts/Barlow/Barlow-Light.ttf
          weight: 300
        - asset: assets/fonts/Barlow/Barlow-Medium.ttf
          weight: 500
        - asset: assets/fonts/Barlow/Barlow-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Barlow/Barlow-ExtraBold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto/Roboto-Medium.ttf
          weight: 500
#        - asset: assets/fonts/Roboto/Roboto-SemiBold.ttf
#          weight: 600
        - asset: assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700
    - family: Pattaya
      fonts:
        - asset: assets/fonts/Pattaya/Pattaya-Regular.ttf
    - family: LibreBodoni
      fonts:
        - asset: assets/fonts/LibreBodoni/LibreBodoni-Regular.ttf
#        - asset: assets/fonts/LibreBodoni/LibreBodoni-Light.ttf
#          weight: 300
        - asset: assets/fonts/LibreBodoni/LibreBodoni-Medium.ttf
          weight: 500
        - asset: assets/fonts/LibreBodoni/LibreBodoni-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/LibreBodoni/LibreBodoni-Bold.ttf
          weight: 700